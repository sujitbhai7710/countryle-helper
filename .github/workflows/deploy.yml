name: Deploy to GitHub Pages

on:
  push:
    branches: ['master']
  workflow_dispatch:
  schedule:
    # Run daily at 18:30 UTC (12:00 AM IST)
    - cron: '30 18 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch today's Country and Capitale answers
        run: |
          node -e "
          const CryptoJS = require('crypto-js');
          const fs = require('fs');
          const https = require('https');

          const AES_KEY = '4%w!KpB+?FC<P9W*';

          function decryptId(encryptedId) {
            try {
              const bytes = CryptoJS.AES.decrypt(encryptedId, AES_KEY);
              const decrypted = bytes.toString(CryptoJS.enc.Utf8);
              return parseInt(decrypted, 10);
            } catch (error) {
              return -1;
            }
          }

          function getDateIST() {
            const now = new Date();
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istTime = new Date(now.getTime() + istOffset);
            
            const day = String(istTime.getDate()).padStart(2, '0');
            const month = String(istTime.getMonth() + 1).padStart(2, '0');
            const year = istTime.getFullYear();
            
            const dateStr = \`\${day}/\${month}/\${year}\`;
            const refDate = new Date('2022-11-15');
            const gameNumber = Math.floor((istTime.getTime() - refDate.getTime()) / (24 * 60 * 60 * 1000));
            
            return { date: dateStr, gameNumber };
          }

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    if (data && data !== 'null') {
                      resolve(JSON.parse(data));
                    } else {
                      resolve(null);
                    }
                  } catch (e) {
                    resolve(null);
                  }
                });
              }).on('error', reject);
            });
          }

          async function main() {
            const { date, gameNumber } = getDateIST();
            console.log('Date:', date, 'Game #:', gameNumber);

            // Load countries and capitals data
            const countriesData = JSON.parse(fs.readFileSync('public/countries.json', 'utf8'));
            const countries = countriesData.countries || [];
            
            let capitalsData = { capitals: [] };
            try {
              const capitalsJson = fs.readFileSync('public/capitals.json', 'utf8');
              // Handle escaped JSON string
              const parsed = JSON.parse(capitalsJson);
              capitalsData = typeof parsed === 'string' ? JSON.parse(parsed) : parsed;
            } catch (e) {
              console.log('Capitals file not found or invalid');
            }
            const capitals = capitalsData.capitals || [];

            // Fetch Country answer
            console.log('\\n=== Fetching Country answer ===');
            const countryUrl = \`https://www.countryle.com/hidden-api/get-daily-country-valid.php?date=\${date}\`;
            
            try {
              const countryResponse = await fetchUrl(countryUrl);
              if (countryResponse && countryResponse.country) {
                const countryId = typeof countryResponse.country === 'string' 
                  ? decryptId(countryResponse.country) 
                  : parseInt(countryResponse.country, 10);
                console.log('Country ID:', countryId);
                
                const country = countries.find(c => c.id === countryId);
                if (country) {
                  const countryAnswer = {
                    date,
                    gameNumber,
                    updated: new Date().toISOString(),
                    country: {
                      id: country.id,
                      country: country.country,
                      continent: country.continent,
                      hemisphere: country.hemisphere,
                      population: country.population,
                      surface: country.surface,
                      avgTemperature: country.avgTemperature,
                      coordinates: country.coordinates,
                      mapsUrl: country.mapsUrl
                    }
                  };
                  fs.writeFileSync('public/todays-answer.json', JSON.stringify(countryAnswer, null, 2));
                  console.log('Saved Country answer:', country.country);
                }
              }
            } catch (e) {
              console.error('Country fetch error:', e.message);
            }

            // Fetch Capitale answer
            console.log('\\n=== Fetching Capitale answer ===');
            const capitaleUrl = \`https://capitale.countryle.com/hidden-api/get-daily-capital-valid.php?date=\${date}\`;
            
            try {
              const capitaleResponse = await fetchUrl(capitaleUrl);
              if (capitaleResponse && capitaleResponse.capital) {
                const capitalId = typeof capitaleResponse.capital === 'string' 
                  ? decryptId(capitaleResponse.capital) 
                  : parseInt(capitaleResponse.capital, 10);
                console.log('Capital ID:', capitalId);
                
                const capital = capitals.find(c => c.id === capitalId);
                if (capital) {
                  const capitaleAnswer = {
                    date,
                    gameNumber: capitaleResponse.number || gameNumber,
                    updated: new Date().toISOString(),
                    capital: {
                      id: capital.id,
                      capital: capital.capital,
                      country: capital.country,
                      continent: capital.continent,
                      population: capital.population,
                      surface: capital.surface,
                      avgTemperature: capital.avgTemperature,
                      height: capital.height,
                      coordinates: capital.coordinates,
                      mapsUrl: capital.mapsUrl
                    }
                  };
                  fs.writeFileSync('public/todays-capitale.json', JSON.stringify(capitaleAnswer, null, 2));
                  console.log('Saved Capitale answer:', capital.capital, '-', capital.country);
                }
              } else {
                console.log('Capitale API returned null - game may not be active');
                // Save empty placeholder to indicate we tried
                fs.writeFileSync('public/todays-capitale.json', JSON.stringify({
                  date,
                  gameNumber,
                  updated: new Date().toISOString(),
                  unavailable: true,
                  capital: null
                }, null, 2));
              }
            } catch (e) {
              console.error('Capitale fetch error:', e.message);
              // Save error state
              fs.writeFileSync('public/todays-capitale.json', JSON.stringify({
                date,
                gameNumber,
                updated: new Date().toISOString(),
                error: e.message,
                capital: null
              }, null, 2));
            }

            console.log('\\n=== Done ===');
          }

          main().catch(console.error);
          "

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
