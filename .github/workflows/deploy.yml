name: Deploy to GitHub Pages

on:
  push:
    branches: ['master']
  workflow_dispatch:
  schedule:
    # Run daily at 18:30 UTC (12:00 AM IST)
    - cron: '30 18 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch today's answer
        run: |
          node -e "
          const CryptoJS = require('crypto-js');
          const fs = require('fs');
          const https = require('https');

          const AES_KEY = '4%w!KpB+?FC<P9W*';

          function decryptCountryId(encryptedId) {
            try {
              const bytes = CryptoJS.AES.decrypt(encryptedId, AES_KEY);
              const decrypted = bytes.toString(CryptoJS.enc.Utf8);
              return parseInt(decrypted, 10);
            } catch (error) {
              return -1;
            }
          }

          function getDateIST() {
            const now = new Date();
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istTime = new Date(now.getTime() + istOffset);
            
            const day = String(istTime.getDate()).padStart(2, '0');
            const month = String(istTime.getMonth() + 1).padStart(2, '0');
            const year = istTime.getFullYear();
            
            const dateStr = \`\${day}/\${month}/\${year}\`;
            const refDate = new Date('2022-11-15');
            const gameNumber = Math.floor((istTime.getTime() - refDate.getTime()) / (24 * 60 * 60 * 1000));
            
            return { date: dateStr, gameNumber };
          }

          const { date, gameNumber } = getDateIST();
          console.log('Date:', date, 'Game #:', gameNumber);

          const url = \`https://www.countryle.com/hidden-api/get-daily-country-valid.php?date=\${date}\`;

          return new Promise((resolve, reject) => {
            https.get(url, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  const json = JSON.parse(data);
                  const encryptedId = json.country || json.id || json;
                  const countryId = typeof encryptedId === 'string' ? decryptCountryId(encryptedId) : parseInt(encryptedId, 10);
                  console.log('Country ID:', countryId);
                  
                  const countries = JSON.parse(fs.readFileSync('public/countries.json', 'utf8')).countries;
                  const country = countries.find(c => c.id === countryId);
                  
                  if (country) {
                    const answer = {
                      date,
                      gameNumber,
                      countryId,
                      countryName: country.country,
                      updated: new Date().toISOString()
                    };
                    
                    fs.writeFileSync('public/todays-answer.json', JSON.stringify(answer, null, 2));
                    console.log('Saved todays answer:', answer.countryName);
                  }
                  resolve();
                } catch (e) {
                  console.error('Error:', e.message);
                  resolve(); // Continue even if fetch fails
                }
              });
            }).on('error', e => {
              console.error('Request error:', e.message);
              resolve(); // Continue even if fetch fails
            });
          });
          "

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
